name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: insight-to-action-engine
  REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev/insight-to-action-engine/insight-to-action-backend
  SERVICE: insight-to-action-api

jobs:
  test-backend:
    name: Test FastAPI Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd apps/backend
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run Tests
        run: |
          # cd apps/backend && pytest tests/

  test-frontend:
    name: Test Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: cd apps/frontend-web && npm ci || npm install
      - name: Build & Lint
        run: |
          cd apps/frontend-web
          npm run build

  deploy-backend:
    name: Build & Deploy Backend to Cloud Run
    needs: [test-backend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v3

